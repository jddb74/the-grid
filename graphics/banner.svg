<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1528"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#74c0ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Glow center -->
  <ellipse cx="400" cy="250" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="100" x2="1500" y2="100" stroke="#1e2535" stroke-width="1"/>
  <line x1="0" y1="200" x2="1500" y2="200" stroke="#1e2535" stroke-width="1"/>
  <line x1="0" y1="300" x2="1500" y2="300" stroke="#1e2535" stroke-width="1"/>
  <line x1="0" y1="400" x2="1500" y2="400" stroke="#1e2535" stroke-width="1"/>

  <!-- Grid lines vertical -->
  <line x1="150" y1="0" x2="150" y2="500" stroke="#1e2535" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="500" stroke="#1e2535" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="500" stroke="#1e2535" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="#1e2535" stroke-width="1"/>
  <line x1="750" y1="0" x2="750" y2="500" stroke="#1e2535" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="500" stroke="#1e2535" stroke-width="1"/>
  <line x1="1050" y1="0" x2="1050" y2="500" stroke="#1e2535" stroke-width="1"/>
  <line x1="1200" y1="0" x2="1200" y2="500" stroke="#1e2535" stroke-width="1"/>
  <line x1="1350" y1="0" x2="1350" y2="500" stroke="#1e2535" stroke-width="1"/>

  <!-- Power bolt icon -->
  <polygon points="170,140 130,260 158,260 138,370 198,230 165,230 195,140" fill="url(#accent)" opacity="0.9"/>

  <!-- THE GRID main title -->
  <text x="250" y="245" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="96" font-weight="800" letter-spacing="-2" fill="#e8eaf0">THE GRID</text>

  <!-- Tagline -->
  <text x="252" y="295" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" letter-spacing="1" fill="#7a8099">Energy, AI, and the infrastructure between them.</text>

  <!-- Accent line -->
  <rect x="252" y="310" width="80" height="3" fill="url(#accent)" rx="2"/>
</svg>
